[package]
name = "srs-benchmark-rust"
version = "0.1.0"
edition = "2021"
description = "A Rust port of open-spaced-repetition/srs-benchmark for speed."
license = "MIT"

[[bin]]
name = "script"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rayon = "1"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
